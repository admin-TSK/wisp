name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  agent:
    name: Agent (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest ruff
      - run: ruff check .
      - run: PYTHONPATH=. pytest -q

  saas:
    name: SaaS (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run test
      - run: npm run typecheck

  db-rls:
    name: RLS policy tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      PGHOST: localhost
      PGUSER: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Create auth.uid() shim + roles (Supabase parity)
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          create role anon nologin;
          create role authenticated nologin;
          create schema if not exists auth;
          create or replace function auth.uid() returns uuid language sql stable as $$
            select nullif(current_setting('request.jwt.claims', true)::json->>'sub', '')::uuid
          $$;
          SQL
      - name: Apply migrations
        run: |
          for f in supabase/migrations/*.sql; do
            echo "applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Grant table privileges to authenticated (Supabase default)
        run: |
          psql -v ON_ERROR_STOP=1 -c "grant usage on schema public to anon, authenticated;"
          psql -v ON_ERROR_STOP=1 -c "grant select, insert, update, delete on all tables in schema public to authenticated;"
      - name: Run RLS test
        run: psql -v ON_ERROR_STOP=1 -f supabase/tests/rls_test.sql

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1
